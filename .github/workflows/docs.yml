name: docs
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write

env:
  DBT_PROFILES_DIR: transform/ci
  DBT_RAW_DB: RAW_ENGCA_PRD
  DBT_ANALYTICS_DB: ANALYTICS_ENGCA_PRD
  SNOWFLAKE_PRIVATE_KEY: ${{ SECRETS.SNOWFLAKE_PRIVATE_KEY_PRD }}
  SNOWFLAKE_USER: ${{ SECRETS.SNOWFLAKE_USER_PRD }}
  SNOWFLAKE_ACCOUNT: ${{ SECRETS.SNOWFLAKE_ACCOUNT }}
  SNOWFLAKE_DATABASE: TRANSFORM_ENGCA_PRD
  SNOWFLAKE_ROLE: READER_ENGCA_PRD
  SNOWFLAKE_WAREHOUSE: REPORTING_XS_ENGCA_PRD
  LLM_MODEL_LOW: ${{ secrets.LLM_MODEL_LOW}}
  LLM_MODEL_MED: ${{ secrets.LLM_MODEL_MED}}
  LLM_MODEL_HIGH: ${{ secrets.LLM_MODEL_HIGH}}
  LLM_MODEL: ${{ github.ref == 'refs/heads/main' && secrets.LLM_MODEL_HIGH || secrets.LLM_MODEL_LOW }}

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Build dbt docs and copy into MKdocs site
        run: |
          uv run dbt deps --project-dir=transform
          uv run dbt docs generate --project-dir=transform --target=prd
          # Copy dbt docs into the folder that MkDocs publishes
          rm -rf docs/dbt
          mkdir -p docs/dbt
          cp -R transform/target/* docs/dbt/

          # Prevent GitHub Pages/Jekyll from stripping "_" asset paths
          touch docs/.nojekyll

          # Fail fast if key files are missing
          test -f docs/dbt/index.html
          test -f docs/dbt/manifest.json
          test -f docs/dbt/catalog.json

      - name: Deploy docs to GitHub Pages
        if: github.ref == 'refs/heads/main'
        run: uv run mkdocs gh-deploy --force
