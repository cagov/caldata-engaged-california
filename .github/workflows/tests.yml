name: tests
on:
  pull_request:
  # Also allow for manual triggers:
  workflow_dispatch:

env:
  DBT_PROFILES_DIR: transform/ci
  DBT_RAW_DB: RAW_ENGCA_PRD
  SNOWFLAKE_PRIVATE_KEY: ${{ SECRETS.SNOWFLAKE_PRIVATE_KEY_DEV }}
  SNOWFLAKE_USER: ${{ SECRETS.SNOWFLAKE_USER_DEV }}
  SNOWFLAKE_ACCOUNT: ${{ SECRETS.SNOWFLAKE_ACCOUNT }}
  SNOWFLAKE_ROLE: TRANSFORMER_ENGCA_DEV
  SNOWFLAKE_WAREHOUSE: TRANSFORMING_XS_ENGCA_DEV
  SNOWFLAKE_DATABASE: TRANSFORM_ENGCA_DEV
  SNOWFLAKE_SCHEMA: GH_CI_PR_${{ github.event.number }}
  LLM_MODEL_LOW: ${{ secrets.LLM_MODEL_LOW}}
  LLM_MODEL_MED: ${{ secrets.LLM_MODEL_MED}}
  LLM_MODEL_HIGH: ${{ secrets.LLM_MODEL_HIGH}}
  LLM_MODEL: ${{ github.ref == 'refs/heads/main' && secrets.LLM_MODEL_HIGH || secrets.LLM_MODEL_LOW }}
  GO_VOCAL_CLIENT_ID: ${{ secrets.GO_VOCAL_CLIENT_ID }}
  GO_VOCAL_CLIENT_SECRET: ${{ secrets.GO_VOCAL_CLIENT_SECRET }}

jobs:
  build-models:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
      - name: Download production manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run list \
            --workflow=pipeline.yml \
            --branch=main \
            --status=success \
            --limit=1 \
            --json databaseId \
            --jq '.[0].databaseId' \
          | xargs -I{} gh run download {} \
            --name dbt-manifest-prod \
            --dir transform/prod-target/ \
          || echo "No manifest found, will run full build"
      - name: Debug manifest location
        run: find transform/prod-target/ -name "manifest.json" 2>/dev/null || echo "No manifest found"
      - name: Build dbt project
        run: |
          uv run dbt deps --project-dir transform

          #slim ci: if a manifest from the most recent successful production run is available,
          #use it to only run models that have changed since that run.
          #If no manifest is available, run the full dbt build.
          if [ -f transform/prod-target/manifest.json ]; then
            echo "Manifest found, running slim CI"
            uv run dbt build \
              --project-dir transform \
              --select state:modified+ \
              --defer \
              --state prod-target/
          else
            echo "No manifest found, running full build"
            uv run dbt build --project-dir transform
          fi

          uv run dbt run-operation validate_all_schemas --args '{"slim_ci": true}' --project-dir transform
