version: 2

models:
  - name: stg_bitly_clicks
    description: Daily click counts for each Bitly link, by link and date. Incl. Strategy and CalInnovate bitly Groups.
    columns:
      - name: bitlink_id
        description: Unique identifier for the Bitly link
      - name: click_date
        description: Date of the click event (aggregated)
      - name: clicks
        description: Number of clicks for the link on the given date

  - name: stg_bitly_links
    description: Details of bitly links. One row per link. Incl. Strategy and CalInnovate bitly Groups.
    columns:
      - name: id
        description: Unique identifier for the Bitly link
      - name: link
        description: Bitly shortened URL Similar to 'id', but in URL format
      - name: long_url
        description: Original long URL
      - name: title
        description: Title of the link
      - name: custom_bitlinks
        description: Array of custom shortlinks linked to this bitlink
      - name: _fivetran_synced
        description: Timestamp of the last update of this record by Fivetran
      - name: organization_name
        description: Name of the bitly organization associated with the link
      - name: group_name
        description: Name of the bitly group associated with the link
      - name: created_date
        description: Date when the link was created
      - name: created_by
        description: Name of the user who created the link (or 'Unknown User')

  - name: stg_bitly_tags
    description: Tags associated with Bitly links
    columns:
      - name: bitlink_id
        description: Unique identifier for the Bitly link
      - name: group_guid
        description: Unique identifier for the Bitly group
      - name: tags
        description: Tags associated with the Bitly link

  - name: stg_bitly_organizations
    description: Bitly organizations. Incl. Strategy and CalInnovate bitly Groups.
    columns:
      - name: organization_guid
        description: Unique identifier for the Bitly organization
      - name: organization_name
        description: Name of the Bitly organization

  - name: stg_bitly_groups
    description: Bitly groups. Incl. Strategy and CalInnovate bitly Groups.
    columns:
      - name: group_guid
        description: Unique identifier for the Bitly group
      - name: group_name
        description: Name of the Bitly group
      - name: organization_guid
        description: Unique identifier for the Bitly organization associated with the group

  - name: stg_bitly_users
    description: Bitly users. Includes ODI and CalInnovate bitly sources.
    columns:
      - name: login
        description: Login name of the Bitly user
      - name: name
        description: Full name of the Bitly user

  - name: stg_bitly_qr_codes
    description: Bitly QR codes from Strategy Bitly group.
    columns:
      - name: qr_code_id
        description: Unique identifier for the QR code
      - name: title
        description: Title of the QR code
      - name: qr_code_type
        description: Type of the QR code
      - name: long_url
        description: Original long URL associated with the QR code
      - name: bitlink_id
        description: Unique identifier for the Bitly link associated with the QR code
      - name: created_time
        description: Date when the QR code was created
      - name: updated_time
        description: Date when the QR code was last updated
      - name: _loaded_at
        description: Timestamp when the record was loaded

  - name: stg_bitly_qr_scans
    description: Bitly QR scan metrics from Strategy Bitly group.
    columns:
      - name: qr_code_id
        description: Unique identifier for the QR code
      - name: total_scans
        description: Total number of scans for the QR code
      - name: _loaded_at
        description: Timestamp when the record was loaded
