version: 2

models:
  - name: stg_ethelo_e3_participants
    description: >
      This model preps the Participants data from Ethelo by removing all users likely to be ODI staff members,
      moderators, or Ethelo staff.
    columns:
      - name: participant_id
        description: The unique identifier for the participant in Ethelo.
      - name: status
        description: The current status of the participant.
      - name: influence
        description: The influence score assigned to the participant. 1 is the highest, 0 is the lowest
      - name: roles
        description: The roles assigned to the participant in Ethelo.
      - name: voting_completed
        description: Percentage of voting tasks completed by the participant.
      - name: survey_completed
        description: Percentage of survey questions completed by the participant.
      - name: completion
        description: Percentage of both voting and survey tasks completed by the participant.
      - name: last_invite_sent
        description: The UTC timestamp of when the last invite was sent to the participant.
      - name: last_sign_in
        description: The UTC timestamp of when the participant last signed in.
      - name: joined_on
        description: The UTC timestamp of when the participant joined.
      - name: _fivetran_synced
        description: Last fivetran sync timestamp.
      - name: _file_upload_date
        description: Date on which this data was downloaded from Ethelo and uploaded to Drive

  - name: stg_ethelo_e3_comments
    description: >
      Comments data with reformatted timestamp, an added moderation column, and with comments
      from test accounts excluded
    columns:
      - name: comment_id
        description: The unique identifier for the comment.
      - name: reply_to_id
        description: The identifier for the comment this comment is replying to.
      - name: comment_content
        description: The content of the comment.
      - name: type
        description: The type associated with the comment. Topic is the highest level of organization
      - name: target
        description: The target of the comment. Target is the second level of organization for comments.
      - name: posted_by_id
        description: The unique identifier for the participant who posted the comment.
      - name: posted_on
        description: The date and time when the comment was posted.
      - name: reply_count
        description: "The number of replies to the comment."
      - name: like_count
        description: The number of likes the comment has received.
      - name: odi_moderation_status
        description: |
          Marks a comment as 'moderator approved' if it was posted on or before 5pm the previous day
          or 'not yet moderated' if posted after 5pm the day before
      - name: _fivetran_synced
        description: Last fivetran sync timestamp.
      - name: _file_upload_date
        description: Date on which this data was downloaded from Ethelo and uploaded to Drive

  - name: stg_ethelo_e3_survey
    description: Filters survey responses to exclude test accounts and remove deleted platform questions.
    columns:
      - name: survey_group
        description: The category name for the survey question.
      - name: question
        description: The survey question being answered.
      - name: answer
        description: The response given to the survey question.
      - name: participant_id
        description: The unique identifier for the participant providing the response.
      - name: response_date
        description: The date when the survey response was submitted.
      - name: joined_date
        description: The date when the participant joined.
      - name: _fivetran_synced
        description: Last fivetran sync timestamp.
      - name: _file_upload_date
        description: Date on which this data was downloaded from Ethelo and uploaded to Drive

  - name: stg_ethelo_e3_department_dropdown
    description: Dropdown choices for the department question in the E3 Government Efficiencies engagement survey
    columns:
      - name: id
        description: Dropdown list item
      - name: statedepartments
        description: Corresponding California state department name
  - name: stg_ethelo_e3_departments_reconciled
    description: |
      State departments list from Airtable, compiled by ODI. This table includes the department list from
      the dropdown in the E3 EngagedCA platform, and a list of corrected department names compiled after
      further research post-launch. This table should be used to reconcile the department names in Ethelo
      from the E3 engagement with the corrected list.
    columns:
      - name: reconciliation_status
        description: Reconciliation status, whether the department appears in and matches Ethelo
      - name: what_the_department_name_should_be
        description: The standardized name for the department
      - name: label_in_ethelo_survey_question
        description: The department name as it appears in the Ethelo survey question
      - name: state_department
        description: The corresponding California state department name
      - name: agency
        description: The corresponding California state agency name
      - name: government_branch_from_agency
        description: The government branch (executive, legislative, judicial) associated with the agency
      - name: notes
        description: Any notes about the reconciliation decision

  - name: stg_e3_hand_labelled_main_ideas
    description: |
      Downloaded from Coda -- this is a list of 400+ 'main ideas' that were hand-labelled for themes
      and types by the UX and Research teams.
    columns:
      - name: participant_id
        description: participant unique identifier from ethelo
      - name: main_idea
        description: full content of comment under the Main Idea question
      - name: main_idea_type
        description: UX-team label for comment TYPE
      - name: main_idea_primary_theme
        description: UX-team label for comment THEME
      - name: main_idea_primary_subthemes
        description: UX-team label for comment SUBTHEME. For informational purposes only
      - name: main_idea_secondary_themes
        description: UX-team label for comment SECONDARY THEME. For informational purposes only
      - name: reviewer
        description: ODI staff member who created the labels
