version: 2
models:
  - name: stg_govocal_email_campaigns
    description: Email campaigns created on the platform.
    columns:
      - name: EMAIL_CAMPAIGN_ID
        description: Unique identifier for each email campaign.
      - name: SENDER
        description: Originator of the email. Example 'author'.
      - name: REPLY_TO
        description: Email address for recipients to reply to.
      - name: SUBJECT
        description: Subject line of the email.
      - name: BODY
        description: Main content of the email.
      - name: SUBJECT_MULTILOC
        description: Key-value pairs of language and translations of the subject line of the email.
      - name: BODY_MULTILOC
        description: Key-value pairs of language and translations of the main content of the email.
      - name: DELIVERIES_COUNT
        description: Number of delivery records for the email campaign.
      - name: CREATED_AT
        description: Timestamp when the email campaign was created.
      - name: UPDATED_AT
        description: Timestamp when the email campaign was last updated.
      - name: _LOAD_DATE
        description: Date the row was loaded into Snowflake.
      - name: _LOADED_AT
        description: Timestamp when the row was loaded into Snowflake.
  - name: stg_govocal_email_campaign_deliveries
    description: Delivery records for email campaigns.
    columns:
      - name: EMAIL_CAMPAIGN_DELIVERY_ID
        description: Unique identifier for each email delivery record.
      - name: EMAIL_CAMPAIGN_ID
        description: ID of the email campaign that the delivery record belongs to.
      - name: USER_ID
        description: ID of the user that the email was sent to.
      - name: DELIVERY_STATUS
        description: |
          Status of the email delivery.
          The possible statuses are: 'sent', 'bounced', 'failed', 'accepted', 'delivered', 'opened', 'clicked'.
      - name: SENT_AT
        description: Timestamp when the email was sent.
      - name: CREATED_AT
        description: Timestamp when the delivery record was created.
      - name: UPDATED_AT
        description: Timestamp when the delivery record was last updated.
      - name: _LOAD_DATE
        description: Date the row was loaded into Snowflake.
      - name: _LOADED_AT
        description: Timestamp when the row was loaded into Snowflake.
  - name: stg_govocal_projects
    description: |
      Go Vocal Projects. Projects are participation scopes. They establish a framework, including the context,
      duration, and expected input from participants.
    columns:
      - name: PROJECT_ID
        description: Unique identifier for each project.
      - name: TITLE
        description: Project title.
      - name: DESCRIPTION_HTML
        description: Project description in HTML format.
      - name: DESCRIPTION_PREVIEW
      - name: SLUG
        description: URL-friendly identifier for the project.
      - name: FOLDER_ID
      - name: HREF
        description: URL to the project on the platform.
      - name: VISIBLE_TO
        description: Who can see the project, such as "public".
      - name: IMAGES
      - name: CREATED_AT
        description: Timestamp when the project was created.
      - name: UPDATED_AT
        description: Timestamp when the project was last updated.
      - name: IDEAS_COUNT
        description: Number of ideas in the project.
      - name: COMMENTS_COUNT
        description: Number of comments in the project.
      - name: MAP_CENTER_GEOJSON
      - name: PUBLICATION_STATUS
        description: Publication status of the project. The possible statuses are 'draft', 'published', 'archived'.
      - name: _LOAD_DATE
        description: Date the row was loaded into Snowflake.
      - name: _LOADED_AT
        description: Timestamp when the row was loaded into Snowflake.
  - name: stg_govocal_phases
    description: Go Vocal phases that define the stages in a project.
    columns:
      - name: PHASE_ID
        description: Unique identifier for each phase.
      - name: TITLE
        description: Phase title.
      - name: DESCRIPTION
        description: Phase description in HTML format.
      - name: PARTICIPATION_METHOD
        description: Participation method used in the phase, such as "ideation" or "voting".
      - name: PROJECT_ID
        description: ID of the project that the phase belongs to.
      - name: PROJECT_TITLE
        description: Title of the project that the phase belongs to.
      - name: CREATED_AT
        description: Timestamp when the phase was created.
      - name: UPDATED_AT
        description: Timestamp when the phase was last updated.
      - name: IDEAS_COUNT
        description: Number of ideas in the phase.
      - name: BASKETS_COUNT
        description: Number of baskets in the phase.
      - name: VOTES_COUNT
        description: Number of votes in the phase.
      - name: SUBMISSION_ENABLED
        description: Whether submission is enabled for the phase.
      - name: AUTOSHARE_RESULTS_ENABLED
      - name: COMMENTING_ENABLED
      - name: REACTING_ENABLED
      - name: REACTING_LIKE_METHOD
      - name: REACTING_LIKE_LIMITED_MAX
      - name: REACTING_DISLIKE_ENABLED
      - name: REACTING_DISLIKE_METHOD
      - name: REACTING_DISLIKE_LIMITED_MAX
      - name: VOTING_METHOD
      - name: VOTING_MAX_TOTAL
      - name: VOTING_MIN_TOTAL
      - name: _LOAD_DATE
        description: Date the row was loaded into Snowflake.
      - name: _LOADED_AT
        description: Timestamp when the row was loaded into Snowflake.
  - name: stg_govocal_ideas
    description: Ideas, proposals and survey responses written by users.
    columns:
      - name: IDEA_ID
        description: Unique identifier for each idea.
      - name: TITLE
        description: Idea title.
      - name: BODY
        description: Idea content in HTML format.
      - name: AUTHOR_ID
        description: User ID of the idea author.
      - name: LIKES_COUNT
        description: Number of likes on the idea.
      - name: DISLIKES_COUNT
        description: Number of dislikes on the idea.
      - name: COMMENTS_COUNT
        description: Number of comments on the idea.
      - name: PUBLISHED_AT
        description: Timestamp when the idea was published.
      - name: SUBMITTED_AT
        description: Timestamp when the idea was submitted.
      - name: PUBLICATION_STATUS
        description: Publication status of the idea. The possible statuses are 'draft', 'submitted', 'published'.
      - name: PROJECT_ID
        description: Project ID that contains the idea.
      - name: PROJECT_TITLE
        description: Title of the project that contains the idea.
      - name: CREATED_AT
        description: Timestamp when the idea was created.
      - name: UPDATED_AT
        description: Timestamp when the idea was last updated.
      - name: LOCATION_POINT
        description: Geospatial point of the idea location.
      - name: LOCATION_DESCRIPTION
      - name: SLUG
        description: URL-friendly identifier for the idea.
      - name: BUDGET
      - name: BASKETS_COUNT
      - name: VOTES_COUNT
      - name: OFFICIAL_FEEDBACKS_COUNT
      - name: ASSIGNEE_ID
      - name: ASSIGNED_AT
      - name: PROPOSED_BUDGET
      - name: CREATION_PHASE_ID
      - name: CREATION_PHASE_TITLE
      - name: SURVEY_TITLE
      - name: IMAGES
      - name: HREF
        description: URL to the idea on the platform.
      - name: IDEA_STATUS
        description: The idea status, such as 'Proposed' or 'Under consideration'. Can be custom-defined.
      - name: CUSTOM_FIELD_VALUES
        description: Custom field values associated with the idea.
      - name: IDEA_TYPE
        description: |
          Idea type, such as "idea" or "survey". Defined by creation phase.
          'survey' — creation phase supports a survey form
          'proposal' — creation phase exists but isn't a survey
          'idea' — no creation phase
      - name: _LOAD_DATE
        description: Date the row was loaded into Snowflake.
      - name: _LOADED_AT
        description: Timestamp when the row was loaded into Snowflake.
  - name: stg_govocal_idea_phases
    description: |
      Associations between ideas and phases. This is a many-to-many relationship: Ideas can belong to multiple
      phases, and phases can be associated with multiple ideas.
    columns:
      - name: IDEA_ID
        description: ID of the idea.
      - name: PHASE_ID
        description: ID of the phase.
      - name: BASKETS_COUNT
        description: Number of baskets the idea is associated with in the phase.
      - name: VOTES_COUNT
        description: Number of votes the idea received in the phase.
      - name: CREATED_AT
        description: Timestamp when the association was created.
      - name: UPDATED_AT
        description: Timestamp when the association was last updated.
      - name: _LOAD_DATE
        description: Date the row was loaded into Snowflake.
      - name: _LOADED_AT
        description: Timestamp when the row was loaded into Snowflake.
  - name: stg_govocal_users
    description: All users registered on the platform.
    columns:
      - name: USER_ID
        description: Unique identifier for each user.
      - name: EMAIL
        description: Email address of the user.
      - name: SLUG
        description: URL-friendly identifier for the user profile.
      - name: ROLES
        description: Roles assigned to the user.
      - name: IS_ADMIN
        description: Whether the user has an admin role.
      - name: FIRST_NAME
        description: First name of the user.
      - name: LAST_NAME
        description: Last name of the user.
      - name: LOCALE
        description: Locale / language preference of the user, such as "en" or "fr".
      - name: BIO
      - name: REGISTRATION_COMPLETED_AT
      - name: VERIFIED
        description: true or false
      - name: EMAIL_CONFIRMED_AT
        description: Timestamp when the user's email was confirmed.
      - name: EMAIL_CONFIRMATION_CODE_SENT_AT
        description: Timestamp when the email confirmation code was sent.
      - name: CONFIRMATION_REQUIRED
        description: true or false
      - name: CUSTOM_FIELD_VALUES
        description: Key-value pairs for profile field values including demographic information..
      - name: AGE
        description: Response to the question "What is your age?"
      - name: GENDER_ARRAY
        description: Responses to the question "What is your gender identity?"
      - name: RACE_ETHNICITY_ARRAY
        description: Responses to the question "What is your race or ethnicity?"
      - name: USER_STATUS
        description: |
          User status. The possible statuses are
          'invited' if invite_status is pending,
          'active' if a user is registered and not blocked,
          'incomplete' for all else.
      - name: CREATED_AT
        description: Timestamp when the user was created.
      - name: UPDATED_AT
        description: Timestamp when the user was last updated.
      - name: _LOAD_DATE
        description: Date the row was loaded into Snowflake.
      - name: _LOADED_AT
        description: Timestamp when the row was loaded into Snowflake.
