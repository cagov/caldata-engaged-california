  - name: ETHELO_LA_DELIBERATION
    database: RAW_ENGCA_PRD
    schema: |
      AIRTABLE_SENSITIVE_PII___LOS_ANGELES_FIRES_RECOVERY_DELIBERATION___SNOWFLAKE_SYNC___ADMIN_ONLY_APPKMTPH1VALYNZLY
    description: |
      Ethelo data for the LA Fires Deliberation engagement (July 2025 -) manually loaded into Airtable,
      then synced to Snowflake via Fivetran.
    tables:
      - name: AVERAGE_WEIGHTS
        columns:
          - name: AVERAGE_WEIGHTING
          - name: ID
          - name: TOPIC
          - name: _FIVETRAN_SYNCED
      - name: BETA_TESTERS
        description: |
          Invited users into the Ethelo platform for testing and feedback.
          Many of these users are ODI or GovOps staff who should be filtered out of most data reports.
        columns:
          - name: ORGANIZATION
            description: |
              An organization tag for the beta tester, if applicable.
          - name: ID
          - name: PARTICIPANT
            description: |
              an Airtable cross-reference ID to the PARTICIPANTS table
          - name: _FIVETRAN_SYNCED
      - name: COMMENTS
        columns:
          - name: COMMENT_ID
          - name: COMMENT_CONTENT
          - name: FLAG_COUNT
          - name: ID
          - name: LIKE_COUNT
          - name: POSTED_BY_ID
          - name: POSTED_ON
          - name: PRIVACY
          - name: REPLY_COUNT
          - name: REPLY_TO_ID
          - name: TARGET
          - name: TARGET_DESCRIPTION
          - name: TOPIC
          - name: TYPE
          - name: _FIVETRAN_SYNCED
          - name: CONTENT
          - name: ODI_MODERATION_STATUS
            description: |
              column brought in from the Moderation Coda to denote which comments have been approved
      - name: INVITATION_EVENTS
        description: derived table in Airtable that tracks the history of invitations sent to participants.
        columns:
          - name: ID
          - name: INVITATION_ACTIVITY
          - name: PARTICIPANT_ID
          - name: FIRST_INVITATION_BATCH
          - name: REINVITATION_BATCH
          - name: _FIVETRAN_SYNCED
      - name: MODERATION_STATUSES
        description: |
          Table uploaded from the Moderation Coda that tracks the moderation status of comments.
          This is used to determine if a comment has been approved or removed by moderators.
          It can also be used to track comments that have not yet been moderated.
        columns:
          - name: ID
          - name: AIRTABLE_RECORD_CREATED
            description: |
              The date and time the record was uploaded to Airtable.
          - name: AIRTABLE_LAST_MODIFIED
            description: |
              The date and time the record was last modified Airtable.
          - name: CODA_STATUS_MODIFIED_ON
            description: |
              The date and time the record was last modified in Coda.
          - name: STATUS
            description: |
              The moderation status of the comment.
          - name: COMMENT_ID
          - name: _FIVETRAN_SYNCED
      - name: PARTICIPANTS
        columns:
          - name: COMMENT_COUNT
          - name: COMPLETION
          - name: ID
