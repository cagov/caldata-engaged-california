  - name: GOOGLE_DRIVE_CONNECTOR
    database: RAW_ENGCA_PRD
    schema: ENGAGEDCA_GOOGLE_DRIVE
    description: |
      Ethelo data for the LA Fires Deliberation engagement (July - August 2025) uploaded once daily to
      an ODI-owned Google Drive folder by Ethelo.
    tables:
      - name: DISAGGREGATED_VOTES_DATA
        columns:
          - name: _FILE
            description: Name of file in the Google Drive folder
          - name: _LINE
            description: "Line number in the source data file."
          - name: _MODIFIED
            description: Timestamp of when the file was last modified in Google Drive
          - name: _FIVETRAN_SYNCED
            description: "Timestamp indicating when the data was last synced with Fivetran."
          - name: PARTICIPANT
            description: Ethelo platform identifier for the participant.
          - name: JOINED_DATE
            description: date on which the participant joined Ethelo
          - name: INFLUENCE
            description: influence flag for participant
