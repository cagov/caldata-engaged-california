  - name: GOV_EFFICIENCIES
    database: RAW_ENGCA_PRD
    schema: GOV_EFFICIENCIES
    description: |
      Government Efficiencies data from various sources including airtable.
      You may see references to E3 in this directory. This is the internal naming convention our team used
      to refer to the State Employees engagement. It refers to the "efficient, effective, and engaged" language
      in the Executive Order N-30-25.
    tables:
      - name: E3_ENGAGEDCA_DEPARTMENT_DROPDOWN
        description: |
          Dropdown choices for the department question in the E3 Government Efficiencies engagement survey
          Snapshot from Airtable
        columns:
          - name: ID
            description: Dropdown list item
          - name: STATEDEPARTMENTS
            description: Corresponding California state department name
      - name: E3_RESEARCH_DEPARTMENT_ETHELO_RECONCILED
        description: |
          State departments list from Airtable, compiled by ODI. This table includes the department list from
          the dropdown in the E3 EngagedCA platform, and a list of corrected department names compiled after
          further research post-launch. This table should be used to reconcile the department names in Ethelo
          from the E3 engagement with the corrected list.
        columns:
          - name: STATUS
            description: "Reconciliation status, whether the department appears in and matches Ethelo"
          - name: WHAT_THE_DEPARTMENT_NAME_SHOULD_BE
            description: "Standardized department name."
          - name: LABEL_IN_ETHELO_SURVEY_QUESTION
            description: "The department name as it appears in the Ethelo survey question."
          - name: LAST_MODIFIED
            description: "Airtable last modified timestamp."
          - name: STATE_DEPARTMENT
            description: "Official state department name."
          - name: AGENCY
            description: "Associated agency."
          - name: GOVERNMENT_BRANCH_FROM_AGENCY
            description: "The government branch (executive, legislative, judicial) of the agency"
          - name: NOTES
            description: "Any reconciliation notes."
          - name: CREATED
            description: "Airtable record creation timestamp."
  - name: UX_AND_RESEARCH
    database: RAW_ENGCA_PRD
    schema: ENGAGEDCA_UX_AND_RESEARCH
    description: |
      Data received from the UX and Research team. Includes hand-labels and QA data.
      You may see references to E3 in this directory. This is the internal naming convention our team used
      to refer to the State Employees engagement. It refers to the "efficient, effective, and engaged" language
      in the Executive Order N-30-25.
    tables:
      - name: E3_HAND_LABELLED_MAIN_IDEAS
        description: |
          Around 400 Main Idea responses from the E3 platform that are hand labelled by the UX and
          research team with the following properties:
          - Main Idea Type is a category that filters ideas for whether they are a good target for
            efficiencies ideas or are too braod
          - Main Idea Primary Theme is a list of curated themes that buckets each comment into
            1 or more topical theme.

          The original table this was pulled from to provide to the team is the E3_PARTICIPANT_RESPONSES
          mart model.
        columns:
          - name: PARTICIPANT_ID
            description: Participant unique identifier from Ethelo.
          - name: MAIN_IDEA
            description: Content of the response to the Main Idea question.
          - name: MAIN_IDEA_TYPE
            description: Label for what 'type' of response this is.
          - name: MAIN_IDEA_PRIMARY_THEME
            description: Theme(s) that apply to each response.
          - name: MAIN_IDEA_PRIMARY_SUBTHEMES
            description: Optional list of subthemes.
          - name: MAIN_IDEA_SECONDARY_THEMES
            description: Optional list of secondary themes.
          - name: REVIEWER
            description: ODI staff member who created the labelling
      - name: E3_ALL_COMMENTS_THEME_MAPPING
        description: |
          Mapping table of e3 themes to subthemes. One row per subtheme. Defined by data engineering team.
          Developed by iterative pruning and refining of the subthemes provided by the UX and Research team.
        columns:
          - name: MAIN_THEME
            description: Comment main themes identified by UX and Research team.
          - name: SUBTHEME
            description: Comment subthemes identified by data engineering team through iterative review of categories.
          - name: SUBTHEME_DESCRIPTION
            description: Subtheme descriptions used to guide llm labelling of comments.
          - name: MAIN_THEME_ID
            description: Unique identifier for each main theme.
          - name: SUBTHEME_ID
            description: Unique identifier for each subtheme.
