      - name: FIRE_ZONE_DEMOS
        description: |
          Demographic targets for fire evacuation zones. Targets based on reaching a representative
          sample of residents from affected Eaton and Palisades evacuation zones with the LA Fires EngagedCA
          engagements.

        columns:
          - name: fire_area
            description: Fire evacuation area name
            data_type: varchar
          - name: demographic_category
            description: Category of demographic (Age, Race and Ethnicity, Gender, Income Level, Housing Status)
            data_type: varchar
          - name: demographic_group
            description: Specific demographic group within the category
            data_type: varchar
          - name: target_count
            description: Target count for this demographic group in the fire area
            data_type: integer
