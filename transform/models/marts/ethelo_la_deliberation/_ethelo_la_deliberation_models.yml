version: 2
models:
  - name: deliberation_demo_targets
    description: "Demographic targets for LA deliberation."
    columns:
      - name: FIRE_AREA
      - name: DEMOGRAPHIC_CATEGORY
      - name: DEMOGRAPHIC_GROUP
      - name: TARGET_COUNT
  - name: la_deliberation_comments
    description: "Comments posted in LA deliberation."
    columns:
      - name: COMMENT_ID
        description: "Unique identifier for each comment."
      - name: REPLY_TO_ID
        description: "ID of the comment being replied to."
      - name: COMMENT_CONTENT
        description: "Content of the comment."
      - name: TOPIC
        description: "Topic of the comment."
      - name: TARGET
        description: "Target of the comment."
      - name: TARGET_DESCRIPTION
        description: "Description of the target."
      - name: REPLY_COUNT
        description: "Number of replies to the comment."
      - name: FLAG_COUNT
        description: "Number of flags on the comment."
      - name: LIKE_COUNT
        description: "Number of likes on the comment."
      - name: POSTED_BY_ID
        description: "ID of the participant who posted the comment."
      - name: POSTED_ON
        description: "Timestamp when the comment was posted."
      - name: _FIVETRAN_SYNCED
        description: "Latest Fivetran sync date."

  - name: la_deliberation_voting_summary
    description: "Voting summary and metrics for LA deliberation topics/options."
    columns:
      - name: TOPIC
        description: "Topic of the vote."
      - name: OPTION
        description: "Option being voted on."
      - name: STRONGLY_OPPOSED
        description: "Number of strongly opposed votes."
      - name: OPPOSED
        description: "Number of opposed votes."
      - name: SOMEWHAT_OPPOSED
        description: "Number of somewhat opposed votes."
      - name: NEUTRAL
        description: "Number of neutral votes."
      - name: SOMEWHAT_SUPPORTIVE
        description: "Number of somewhat supportive votes."
      - name: SUPPORTIVE
        description: "Number of supportive votes."
      - name: STRONGLY_SUPPORTIVE
        description: "Number of strongly supportive votes."
      - name: ABSTAIN_VOTES
        description: "Number of abstain votes."
      - name: TOTAL_VOTES
        description: "Total number of votes."
      - name: POSITIVE_VOTES
        description: "Number of positive votes."
      - name: NEGATIVE_VOTES
        description: "Number of negative votes."
      - name: SUPPORT
        description: "Support metric."
      - name: CONSENSUS
        description: "Consensus metric."
      - name: CONFLICT
        description: "Conflict metric."
      - name: APPROVAL
        description: "Approval metric."
      - name: AVERAGE_WEIGHTING
        description: "Average weighting metric."
      - name: IN_BEST_SCENARIO
        description: "Best scenario flag."
      - name: AIRTABLE_ID
        description: "Airtable record ID."
      - name: _FIVETRAN_SYNCED
        description: "Latest Fivetran sync date."
  - name: individual_voting_results
    description: ""
    columns:
      - name: participant_id
        description: ""
      - name: vote_option
        description: ""
      - name: vote
        description: ""
      - name: target_name
        description: ""
      - name: _fivetran_synced
        description: ""
      - name: vote_number
        description: ""
      - name: consensus
        description: ""
      - name: comment_id
        description: ""
      - name: comment_content
        description: ""
      - name: like_count
        description: ""
      - name: reply_count
        description: ""
  - name: la_deliberation_participants
    columns:
      - name: PARTICIPANT_ID
        description: The unique identifier for the participant
      - name: STATUS
      - name: VOTING_COMPLETE
        description: Whether the participant has completed voting
      - name: SURVEY_COMPLETED
        description: Whether the participent has completed the survey
      - name: COMPLETION
      - name: RACE_ETHNICITY_ARRAY
      - name: INCOME
      - name: AGE
      - name: GENDER_IDENTITY
      - name: CONFIDENCE_INCREASE
      - name: EVACUATION_ZONE
      - name: RECOVERY_OPTIONS_FEELING
      - name: OPENING_OUTLOOK
      - name: FINAL_OUTLOOK
      - name: LAST_INVITE_SENT
        description: The last time an invite was sent to the participant
      - name: LAST_SIGN_IN
        description: The last time the participant signed in
      - name: JOINED_ON
        description: What time the participant joined the platform
      - name: AIRTABLE_ID
      - name: _FIVETRAN_SYNCED
