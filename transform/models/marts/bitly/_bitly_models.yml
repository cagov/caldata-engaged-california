version: 2

models:
  - name: bitly_daily_link_clicks
    description: Daily click counts for each Bitly link.
    columns:
      - name: link
        description: Bitly shortened URL.
      - name: title
        description: Title of the Bitly link.
      - name: custom_bitlinks
        description: List of custom shortlinks linked to this bitlink
      - name: link_tags
        description: Comma-separated list of tags associated with the Bitly link.
      - name: created_date
        description: Date when the Bitly link was created.
      - name: click_date
        description: Date of the click event.
      - name: days_since_creation
        description: Number of days between click date and date Bitly link was created.
      - name: clicks
        description: Number of clicks for the link on the given date.

  - name: bitly_link_clicks
    description: Total all-time click counts for each Bitly link, including link metadata.
    columns:
      - name: link
        description: Bitly shortened URL.
      - name: long_url
        description: Original long URL.
      - name: title
        description: Title of the Bitly link.
      - name: custom_bitlinks
        description: List of custom shortlinks linked to this bitlink
      - name: organization_name
        description: Name of the organization associated with the link.
      - name: group_name
        description: Name of the group associated with the link.
      - name: link_tags
        description: Comma-separated list of tags associated with the Bitly link.
      - name: created_date
        description: Date when the Bitly link was created.
      - name: created_by
        description: Name of the user who created the link (or 'Unknown User').
      - name: total_clicks
        description: Total number of clicks

  - name: bitly_last_update
    description: Timestamp of the last full update of bitly data from Fivetran.
    columns:
      - name: last_update
        description: Timestamp of the last update of bitly data from Fivetran. Min of the '_fivetran_synced' field.

  - name: bitly_qr_scans
    description: Timestamp of the last full update of bitly data from Fivetran.
    columns:
      - name: last_update
        description: Timestamp of the last update of bitly data from Fivetran. Min of the '_fivetran_synced' field.
