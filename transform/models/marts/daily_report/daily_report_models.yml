version: 2
models:
  - name: mailchimp_subscribers
    description: "Aggregated Mailchimp subscriber totals by status."
    columns:
      - name: list_name
        description: "Name of the Mailchimp list/audience."
      - name: total_subscribed
        description: "Total number of subscribed emails."
      - name: total_unsubscribed
        description: "Total number of unsubscribed emails."
      - name: max_fivetran_sync_date
        description: "Latest Fivetran sync date."
  - name: mailchimp_metrics
    description: "Mailchimp campaign metrics averages by campaign type."
    columns:
      - name: list_name
        description: "Name of the Mailchimp list/audience."
      - name: total_sends
        description: "Total number of emails sent."
      - name: avg_open_rate
        description: "Average open rate across campaigns."
      - name: avg_click_rate
        description: "Average click rate across campaigns."
      - name: avg_bounce_rate
        description: "Average bounce rate across campaigns."
      - name: campaign_type
        description: "Type of campaign."
      - name: max_fivetran_sync_date
        description: "Latest Fivetran sync date."
  - name: ethelo_la_deliberation_participants
    description: "Participant counts and join status for LA deliberation."
    columns:
      - name: num_invited
        description: "Number of invited participants."
      - name: num_joined
        description: "Number of participants who joined."
      - name: num_invited_before_today
        description: "Number of participants invited before today."
      - name: num_invited_before_today_and_joined
        description: "Number of participants invited before today and joined."
      - name: max_fivetran_sync
        description: "Latest Fivetran sync date."
  - name: ethelo_la_deliberation_comments
    description: "Comment counts and participant engagement by evacuation zone."
    columns:
      - name: num_comments
        description: "Number of comments posted."
      - name: num_participants_w_commments
        description: "Number of participants who posted comments."
      - name: evacuation_zone
        description: "Evacuation zone of participants."
      - name: max_fivetran_sync
        description: "Latest Fivetran sync date."
  - name: email_report_metrics
    description: "Mailchimp subscriber counts for specific dates and previous day."
    columns:
      - name: subcribers_up_to_july_15
        description: "Subscribers up to July 15, 2025."
      - name: subcribers_since_july_16
        description: "Subscribers since July 16, 2025."
      - name: prev_day_subcribers
        description: "Subscribers for the previous day."
      - name: prev_day
        description: "Date of previous day."
  - name: mailchimp_engaged_california_segments
    description: "Mailchimp segment subscriber counts for Engaged California LA Wildfire phases and topics."
    columns:
      - name: eaton_phase1_total
        description: "Total subscribers in Eaton Phase 1 segment."
      - name: palisades_phase1_total
        description: "Total subscribers in Palisades Phase 1 segment."
      - name: eaton_and_palisades_phase1_total
        description: "Total subscribers in both Eaton and Palisades Phase 1 segments."
      - name: future_topics
        description: "Total subscribers in future topics segment."
      - name: future_topics_only
        description: "Total subscribers in future topics only segment."
      - name: eaton_phase2_total
        description: "Total subscribers in Eaton Phase 2 segment."
      - name: palisades_phase2_total
        description: "Total subscribers in Palisades Phase 2 segment."
      - name: no_fire_phase2_total
        description: "Total subscribers in no fire Phase 2 segment."
      - name: no_segment_total
        description: "Total subscribers with no segment."
      - name: max_fivetran_sync_date
        description: "Latest Fivetran sync date."

  - name: ethelo_e3_comments_counts
    description: "Comment counts for E3 engagement"
    columns:
      - name: num_comments
        description: "Number of comments posted."
      - name: NUM_PARTICIPANTS_W_COMMMENTS
        description: "Number of participants who posted comments."
      - name: num_what_makes_you_proud_responses
        description: "Number of responses to the question about what makes you proud"
      - name: num_big_idea_comments
        description: "Number of comments responding to the big idea question."
      - name: num_big_idea_replies
        description: "Number of replies to big idea comments."
      - name: num_whats_been_working_comments
        description: "Number of comments on what's been working."
      - name: num_whats_been_working_replies
        description: "Number of replies to what's been working comments."
      - name: num_anything_else_comments
        description: "Number of comments on the anything else prompt."
      - name: num_anything_else_replies
        description: "Number of replies to anything else prompt comments."
      - name: latest_data_download
        description: "Latest data download date from Ethelo."

  - name: ethelo_e3_participants_counts
    description: "Participant counts for E3 engagement"
    columns:
      - name: num_invited
        description: "Number of invited participants."
      - name: num_joined
        description: "Number of participants who joined."
      - name: num_invited_before_today
        description: "Number of participants invited before today."
      - name: num_invited_before_today_and_joined
        description: "Number of participants invited before today who joined."
      - name: latest_data_download
        description: "Latest  data download date from Ethelo."

  - name: ethelo_e3_response_counts
    description: "Number of uniques participants per response for E3 engagement"
    columns:
      - name: metric_value
        description: "Count (of participants or responses) for the given metric_type and response_value"
      - name: metric_type
        description:
          "Indicates which metric is being reported: response count by department,
          participant count by position, or participant count by tenure"
      - name: response_value
        description:
          "Each unique value given by participants. For department responses, these
          are the different departments selected by participants or inferred from the comment and
          write-in responses using LLM."
