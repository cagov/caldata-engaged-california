version: 2
models:
  - name: e3_comments
    description: |
      "Clean, mart-ready comments and responses from the Ethelo E3 engagement platform.
      This model provides a simplified view of participant comments and responses for
      analysis and reporting purposes."
    columns:
      - name: COMMENT_ID
        description:
          "Unique identifier for each comment or response. NULL for the
          survey questions that are included in this comments table."
      - name: REPLY_TO_ID
        description: "Identifier of the comment this is a reply to. NULL for top-level comments"
      - name: PARTICIPANT_ID
        description: "Unique identifier for the participant who posted the comment"
      - name: CONTENT
        description: "The actual text content of the comment or response provided by the participant"
      - name: QUESTION
        description: "The question or prompt that this comment is responding to"
      - name: POSTED_ON
        description: "Timestamp when the comment was originally posted by the participant"
      - name: _FILE_UPLOAD_DATE
        description: "Technical field indicating when this data was uploaded/ingested into the system"

  - name: e3_participant_responses
    description: |
      "One row per participant with pivoted survey responses and top-level comments
      from the Ethelo E3 engagement platform. This model aggregates all participant
      responses into a single row for analysis and demographic profiling."
    columns:
      - name: PARTICIPANT_ID
        description: "Unique identifier for each participant in the E3 engagement"
      - name: POINT_OF_PRIDE
        description: "Response to 'Opening question - What makes you proud about your role in public service?'"
      - name: IDEA_DEPT
        description: "Response to 'Share your idea - Which department or agency does your idea apply to?'"
      - name: POS_TYPE
        description: "Response to 'About you - Position type'"
      - name: CA_TENURE
        description: "Response to 'About you - How long have you worked for the State of California?'"
      - name: MAIN_IDEA
        description: "Top-level comment for 'Share your idea - Primary problem and ideas to solve the problem'"
      - name: WHATS_WORKING
        description: "Top-level comment for 'Share what has been working - Examples'"
      - name: OTHER_IDEAS
        description:
          "Top-level comment for 'Anything else? - Would you add any other ideas,
          including from your perspective as a California resident?'"
      - name: LAST_SURVEY_RESPONSE_DATE
        description: "Timestamp of the participant's most recent survey response"
      - name: LAST_COMMENT_DATE
        description: "Timestamp of the participant's most recent top-level comment"
      - name: _FILE_UPLOAD_DATE
        description: "Technical field indicating when this data was uploaded/ingested into the system"

  - name: e3_consolidated_problem_solutions
    description: |
      "Consolidated problem-solution pairs from the E3 engagement platform.
      Each row represents one unique problem with AI-consolidated solutions and full traceability.
      Solutions are aggregated and synthesized using AI to provide coherent, actionable recommendations."
    config:
      materialized: incremental
      unique_key: ["problem_comment_id", "problem_sequence"]
    columns:
      - name: PROBLEM_COMMENT_ID
        description: "Unique identifier of the comment where the problem was identified"
      - name: PROBLEM_PARTICIPANT_ID
        description: "Participant who posted the comment containing the problem"
      - name: PROBLEM_POSTED_ON
        description: "Date when the problem comment was posted"
      - name: PROBLEM_SEQUENCE
        description: "Sequence number of the problem within its source comment"
      - name: PROBLEM_TEXT
        description: "Original text of the identified problem"
      - name: PROBLEM_LENGTH
        description: "Character length of the problem text"
      - name: EXPLICIT_DEPARTMENT
        description: "Department/agency specified by participant for main idea comments"
      - name: INFERRED_DEPARTMENTS
        description: "Array of departments inferred by AI from problem context"
      - name: ALL_DEPARTMENTS
        description: "Combined array of explicit and inferred departments with duplicates removed"
      - name: SOLUTION_COUNT
        description: "Number of solutions linked to this problem"
      - name: AVG_CONFIDENCE_SCORE
        description: "Average confidence score of all problem-solution links (0.0-1.0)"
      - name: LINK_TYPES_USED
        description: "Types of linking methods used (DIRECT_REPLY, SAME_COMMENT, THREAD_REPLY, SEMANTIC_MATCH)"
      - name: EARLIEST_SOLUTION_DATE
        description: "Date of the earliest solution linked to this problem"
      - name: LATEST_SOLUTION_DATE
        description: "Date of the latest solution linked to this problem"
      - name: CONSOLIDATED_SOLUTIONS
        description: "AI-generated array of 1-5 consolidated solution descriptions"
      - name: SOLUTION_THEMES
        description: "AI-identified key themes across all solutions for this problem"
      - name: SOLUTION_TRACE_IDS
        description: "Semicolon-separated list of solution IDs with confidence scores for traceability"
      - name: ORIGINAL_SOLUTIONS_DETAIL
        description: "Full text of all original solutions for transparency and debugging"
      - name: CONSOLIDATION_STATUS
        description: "Status of LLM consolidation process (SUCCESS or FAILED)"
      - name: PROBLEM_ID
        description: "Unique identifier combining comment ID and problem sequence"
      - name: CONSOLIDATED_AT
        description: "Timestamp when the AI consolidation was performed"

  - name: e3_embeddings_unified
    description: |
      "Unified embedding table containing both raw main ideas and processed problem/solution pairs.
      Each row represents one text item with consistent embeddings for similarity analysis.
      All text is contextualized to ensure embeddings are grounded in the same semantic space."
    columns:
      - name: CONTENT_ID
        description: "Unique identifier for each content item"
        tests:
          - not_null
          - unique
      - name: PARTICIPANT_ID
        description: "Participant who submitted the original content"
      - name: CONTENT_TYPE
        description: "Type of content: 'Raw Main Idea' or 'Processed Problem & Solution'"
        tests:
          - not_null
          - accepted_values:
              values: ["Raw Main Idea", "Processed Problem & Solution"]
      - name: CONTEXTUALIZED_TEXT
        description: "Text with added context for consistent embedding generation"
      - name: ORIGINAL_TEXT
        description: "Original text without additional context"
      - name: PROBLEM_ID
        description: "Unique problem identifier (only for processed problem/solution pairs)"
      - name: SOLUTION_COUNT
        description: "Number of solutions consolidated (only for processed pairs)"
      - name: DEPARTMENTS
        description: "Array of departments associated with the content"
      - name: EMBEDDING_VECTOR
        description: "1024-dimensional embedding vector generated using snowflake-arctic-embed-l-v2.0"
        tests:
          - not_null
      - name: CONTEXTUALIZED_TEXT_LENGTH
        description: "Character length of the contextualized text"
      - name: ORIGINAL_TEXT_LENGTH
        description: "Character length of the original text"
      - name: _FILE_UPLOAD_DATE
        description: "Date when the source data was uploaded/processed"
      - name: PROCESSED_AT
        description: "Timestamp when the embeddings were generated"
