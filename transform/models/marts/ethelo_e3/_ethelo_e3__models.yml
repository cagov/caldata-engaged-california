version: 2
models:
  - name: e3_comments
    description: |
      "Clean, mart-ready comments and responses from the Ethelo E3 engagement platform.
      This model provides a simplified view of participant comments and responses for
      analysis and reporting purposes."
    columns:
      - name: COMMENT_ID
        description:
          "Unique identifier for each comment or response. NULL for the
          survey questions that are included in this comments table."
      - name: REPLY_TO_ID
        description: "Identifier of the comment this is a reply to. NULL for top-level comments"
      - name: PARTICIPANT_ID
        description: "Unique identifier for the participant who posted the comment"
      - name: CONTENT
        description: "The actual text content of the comment or response provided by the participant"
      - name: QUESTION
        description: "The question or prompt that this comment is responding to"
      - name: POSTED_ON
        description: "Timestamp when the comment was originally posted by the participant"
      - name: LIKE_COUNT
        description: "Number of likes the comment received from other users in the platform."
      - name: _FILE_UPLOAD_DATE
        description: "Technical field indicating when this data was uploaded/ingested into the system"

  - name: e3_participant_responses
    description: |
      "One row per top-level comment with pivoted survey responses from the Ethelo E3 engagement platform."
    columns:
      - name: PARTICIPANT_ID
        description: "Unique identifier for each participant in the E3 engagement"
      - name: POINT_OF_PRIDE
        description: "Response to 'Opening question - What makes you proud about your role in public service?'"
      - name: IDEA_DEPT
        description: "Response to 'Share your idea - Which department or agency does your idea apply to?'"
      - name: POS_TYPE
        description: "Response to 'About you - Position type'"
      - name: CA_TENURE
        description: "Response to 'About you - How long have you worked for the State of California?'"
      - name: MAIN_IDEA
        description: "Top-level comment for 'Share your idea - Primary problem and ideas to solve the problem'"
      - name: WHATS_WORKING
        description: "Top-level comment for 'Share what has been working - Examples'"
      - name: OTHER_IDEAS
        description:
          "Top-level comment for 'Anything else? - Would you add any other ideas,
          including from your perspective as a California resident?'"
      - name: LAST_SURVEY_RESPONSE_DATE
        description: "Timestamp of the participant's most recent survey response"
      - name: LAST_COMMENT_DATE
        description: "Timestamp of the participant's most recent top-level comment"
      - name: _FILE_UPLOAD_DATE
        description: "Technical field indicating when this data was uploaded/ingested into the system"

  - name: e3_consolidated_problem_solutions
    description: |
      "Consolidated problem-solution pairs from the E3 engagement platform.
      Each row represents one unique problem with AI-consolidated solutions and full traceability.
      Solutions are aggregated and synthesized using AI to provide coherent, actionable recommendations."
    config:
      materialized: incremental
      unique_key: ["problem_comment_id", "problem_sequence"]
    columns:
      - name: PROBLEM_COMMENT_ID
        description: "Unique identifier of the comment where the problem was identified"
      - name: PROBLEM_PARTICIPANT_ID
        description: "Participant who posted the comment containing the problem"
      - name: PROBLEM_POSTED_ON
        description: "Date when the problem comment was posted"
      - name: PROBLEM_SEQUENCE
        description: "Sequence number of the problem within its source comment"
      - name: PROBLEM_TEXT
        description: "Original text of the identified problem"
      - name: PROBLEM_LENGTH
        description: "Character length of the problem text"
      - name: DEPARTMENT_USER_DEFINED
        description: "Semicolon-separated list of explicit user entries (dropdown and write-in) for department(s)"
      - name: DEPARTMENT_USER_AI_COMBINED
        description: |
          "Semicolon-separated list of department(s) containing explicit user
          entries with gaps filled in by LLM completion"
      - name: SOLUTION_COUNT
        description: "Number of solutions linked to this problem"
      - name: AVG_CONFIDENCE_SCORE
        description: "Average confidence score of all problem-solution links (0.0-1.0)"
      - name: LINK_TYPES_USED
        description: "Types of linking methods used (DIRECT_REPLY, SAME_COMMENT, THREAD_REPLY, SEMANTIC_MATCH)"
      - name: EARLIEST_SOLUTION_DATE
        description: "Date of the earliest solution linked to this problem"
      - name: LATEST_SOLUTION_DATE
        description: "Date of the latest solution linked to this problem"
      - name: CONSOLIDATED_SOLUTIONS
        description: "AI-generated array of 1-5 consolidated solution descriptions"
      - name: SOLUTION_THEMES
        description: "AI-identified key themes across all solutions for this problem"
      - name: SOLUTION_TRACE_IDS
        description: "Semicolon-separated list of solution IDs with confidence scores for traceability"
      - name: ORIGINAL_SOLUTIONS_DETAIL
        description: "Full text of all original solutions for transparency and debugging"
      - name: CONSOLIDATION_STATUS
        description: "Status of LLM consolidation process (SUCCESS or FAILED)"
      - name: PROBLEM_ID
        description: "Unique identifier combining comment ID and problem sequence"
      - name: CONSOLIDATED_AT
        description: "Timestamp when the AI consolidation was performed"

  - name: e3_embeddings_unified
    description: |
      "Unified embedding table containing both raw main ideas and processed problem/solution pairs.
      Each row represents one text item with consistent embeddings for similarity analysis.
      All text is contextualized to ensure embeddings are grounded in the same semantic space."
    columns:
      - name: CONTENT_ID
        description: "Unique identifier for each content item"
        tests:
          - not_null
          - unique
      - name: PARTICIPANT_ID
        description: "Participant who submitted the original content"
      - name: CONTENT_TYPE
        description: "Type of content: 'Raw Main Idea' or 'Processed Problem & Solution'"
        tests:
          - not_null
          - accepted_values:
              values: ["Raw Main Idea", "Processed Problem & Solution"]
      - name: CONTEXTUALIZED_TEXT
        description: "Text with added context for consistent embedding generation"
      - name: ORIGINAL_TEXT
        description: "Original text without additional context"
      - name: PROBLEM_ID
        description: "Unique problem identifier (only for processed problem/solution pairs)"
      - name: SOLUTION_COUNT
        description: "Number of solutions consolidated (only for processed pairs)"
      - name: DEPARTMENTS
        description: "Array of departments associated with the content"
      - name: EMBEDDING_VECTOR
        description: "1024-dimensional embedding vector generated using snowflake-arctic-embed-l-v2.0"
        tests:
          - not_null
      - name: CONTEXTUALIZED_TEXT_LENGTH
        description: "Character length of the contextualized text"
      - name: ORIGINAL_TEXT_LENGTH
        description: "Character length of the original text"
      - name: _FILE_UPLOAD_DATE
        description: "Date when the source data was uploaded/processed"
      - name: PROCESSED_AT
        description: "Timestamp when the embeddings were generated"

  - name: e3_topic_themes
    description: |
      "Topic-level summaries generated from the dbt topic labeling pipeline. Each row represents a
      discovered topic with LLM-authored metadata that can be surfaced directly to end users."
    columns:
      - name: TOPIC_ID
        description: "Stable topic identifier per content type (e.g., '1-1')"
      - name: CONTENT_TYPE
        description: "Source content grouping for the topic ('Raw Main Idea' or 'Processed Problem & Solution')"
      - name: TOPIC_MEMBER_COUNT
        description: "Number of content records assigned to this topic"
      - name: TOPIC_NAME
        description: "Concise LLM-generated title summarizing the topic"
      - name: TOPIC_DESCRIPTION
        description: "Short narrative description returned by the LLM"
      - name: REPRESENTATIVE_QUOTES
        description: "JSON array (as text) of 2-3 representative snippets used to label the topic"
      - name: COMMENTS_FOR_LABELING
        description: "Concatenated snippets that were supplied to the LLM when generating the label"

  - name: e3_topic_contents
    description: |
      "Per-idea topic assignments from the dbt topic modeling pipeline. Contains probabilities,
      outlier flags, and 2D projections for downstream visualization and analysis."
    columns:
      - name: CONTENT_TYPE
        description: "Source content grouping for the idea ('Raw Main Idea' or 'Processed Problem & Solution')"
      - name: TOPIC_ID
        description: "Topic identifier assigned to the idea; NULL when HDBSCAN marked it as an outlier"
      - name: TOPIC_NAME
        description: "Topic title joined from the labeling table (NULL for outliers)"
      - name: CONTENT_ID
        description: "Primary key of the idea from `e3_embeddings_unified`"
      - name: PARTICIPANT_ID
        description: "Participant associated with the idea"
      - name: ORIGINAL_TEXT
        description: "Original idea text used during modeling"
      - name: TOPIC_PROBABILITY
        description: "Cluster membership probability when provided by HDBSCAN"
      - name: IS_OUTLIER
        description: "Boolean flag indicating that the idea was treated as noise"
      - name: UMAP_X
        description: "First coordinate from the standardized 2D UMAP projection"
      - name: UMAP_Y
        description: "Second coordinate from the standardized 2D UMAP projection"

  - name: e3_problems_solutions_comments
    description: |
      "Comments linked to Problems and Solutions from the Ethelo E3 engagement platform.
      This model provides a simplified view of participant comments linked to problems
      and solutions used for analysis and reporting purposes."
    columns:
      - name: COMMENT_ID_LINKED_TO_PROBLEM
        description: "Unique identifier for each comment linked to a problem"
      - name: PROBLEM_TEXT_ID
        description: "Identifier of the problem text"
      - name: PROBLEM_POSTED_ON
        description: "Timestamp when the problem text was originally posted"
      - name: PROBLEM_TEXT
        description: "The text of the problem"
      - name: COMMENT_LINKED_TO_PROBLEM
        description: "The text content of the comment provided by the participant linked to a problem"
      - name: COMMENT_ID_LINKED_TO_SOLUTION
        description: "Unique identifier for each comment linked to a solution"
      - name: SOLUTION_TEXT_ID
        description: "Identifier of the solution text"
      - name: SOLUTION_POSTED_ON
        description: "Timestamp when the solution text was originally posted"
      - name: SOLUTION_TEXT
        description: "The text of the solution"
      - name: COMMENT_LINKED_TO_SOLUTION
        description: "The text content of the comment provided by the participant linked to a solution"
  - name: e3_topic_themes_ux_ai
    description: |
      This model classifies Ethelo E3 comments into subthemes
      using a combination of hand-labelled data and LLM classification.
    columns:
      - name: PARTICIPANT_ID
        description: Unique identifier for the participant who posted the comment.
      - name: COMMENT_ID
        description: Unique identifier for each comment.
      - name: POSTED_ON
        description: The date and time when the comment was posted.
      - name: QUESTION
        description: The question or prompt that the comment is responding to.
      - name: COMMENT_CONTENT
        description: The content of the comment.
      - name: LLM_SUBTHEMES_ARRAY
        description: Array of subthemes assigned by the LLM.
      - name: UX_MAIN_IDEA_TYPE
        description: The type of main idea as labeled by the UX team.
      - name: UX_MAIN_IDEA_PRIMARY_THEME
        description: The primary theme of the main idea as labeled by the UX team.
      - name: UX_MAIN_IDEA_SUBTHEMES
        description: The subthemes of the main idea as labeled by the UX team.
  - name: e3_topic_themes_polished
    description: |
      This model provides manually refined subthemes for some difficult to classify comments. It also
      deterministically assigns main themes based on the subtheme assignments.
      using a combination of hand-labelled data and LLM classification.
    columns:
      - name: PARTICIPANT_ID
        description: Unique identifier for the participant who posted the comment.
      - name: COMMENT_ID
        description: Unique identifier for each comment.
      - name: POSTED_ON
        description: The date and time when the comment was posted.
      - name: QUESTION
        description: The question or prompt that the comment is responding to.
      - name: COMMENT_CONTENT
        description: The content of the comment.
      - name: POLISHED_MAIN_THEME_ARRAY
        description: Array of main themes after applying manual override classifications.
      - name: POLISHED_SUBTHEMES_ARRAY
        description: Array of subthemes after applying manual override classifications.
      - name: NUM_POLISHED_SUBTHEMES
        description: Number of polished subthemes assigned to the comment.
      - name: LLM_SUBTHEMES_ARRAY
        description: Array of subthemes assigned by the LLM.
      - name: UX_MAIN_IDEA_TYPE
        description: The type of main idea as labeled by the UX team.
      - name: UX_MAIN_IDEA_PRIMARY_THEME
        description: The primary theme of the main idea as labeled by the UX team.
      - name: UX_MAIN_IDEA_SUBTHEMES
        description: The subthemes of the main idea as labeled by the UX team.
  - name: e3_solution_themes
    description: |
      This model attempts to shape the solutions data to make it easier to select "top solutions" from the E3 dataset.
      It takes the subtheme/main theme map and labels each solution statement with one or more subthemes
      The final output is a list of solution statement subtheme assignments.
    columns:
      - name: SOLUTION_ID
        description: Unique id for each solution statement.
      - name: SOLUTION_COMMENT_ID
        description: comment_id where the solution was identified
      - name: REPLY_TO_ID
        description: Identifier of the comment this is a reply to. NULL for top-level comments
      - name: SOURCE_COMMENT
        description: The original comment text from which the solution was extracted
      - name: SOLUTION_SEQUENCE
        description: Sequence number of the solution within its source comment
      - name: SOLUTION_TEXT
        description: The text of the solution statement
      - name: SOLUTION_SUBTHEMES_ARRAY
        description: Array of subthemes assigned to the solution statement by the LLM
  - name: e3_solution_themes_polished
    description: |
      This model provides manually refined subthemes for some difficult to classify solutions. It also
      deterministically assigns main themes based on the subtheme assignments.
    columns:
      - name: SOLUTION_ID
        description: Unique id for each solution statement.
      - name: SOLUTION_COMMENT_ID
        description: comment_id where the solution was identified
      - name: REPLY_TO_ID
        description: Identifier of the comment this is a reply to. NULL for top-level comments
      - name: SOURCE_COMMENT
        description: The original comment text from which the solution was extracted
      - name: SOLUTION_SEQUENCE
        description: Sequence number of the solution within its source comment
      - name: SOLUTION_TEXT
        description: The text of the solution statement
      - name: POLISHED_SOLUTION_SUBTHEMES_ARRAY
        description: Array of subthemes assigned to the solution statement including manual refinement.
      - name: NUM_SOLUTION_SUBTHEMES
        description: Number of polished subthemes assigned to the solution statement.
      - name: SOLUTION_SUBTHEME
        description: Subtheme assigned to the solution statement by the LLM or manual refinement
      - name: SOLUTION_MAIN_THEME
        description: Main theme corresponding to the assigned subtheme
