version: 2
models:
  - name: govocal_user_counts
    description: |
      This model calculates the count of Go Vocal users by various demographic and survey response fields.
    columns:
      - name: role_at_work
        description: Response to the question 'What is your role at work?'
      - name: county
        description: Response to the question 'Which county do you live in?'
      - name: field_of_work
        description: Response to the question 'Which best describes your field of work?'
      - name: age
        description: Response to the question 'What is your age?'
      - name: gender
        description: |
          Response to the question 'What is your gender identity?' with multiple responses categorized as 'multiple'.
      - name: race_ethnicity
        description: |
          Response to the question 'What is your race or ethnicity?' with multiple responses categorized as 'multiple'.
      - name: gv_users_count
        description: Count of Go Vocal users in each demographic and survey response category.
      - name: respondents_count
        description: Count of survey respondents in each demographic and survey response category.
      - name: submitted_count
        description: Count of survey responses submitted by users in each demographic and survey response category.
      - name: drafts_count
        description: |
          Count of survey responses saved as drafts by users in each demographic and survey response category.
      - name: available_for_discussion_count
        description: |
          Count of survey respondents who answered 'Yes' or 'Maybe' to whether they would be open to joining a live
          discussion about AI.
      - name: all_fields_completed_count
        description: Count of survey respondents who completed all fields in the AI survey.
      - name: data_loaded_at
        description: Timestamp of the most recent load of Go Vocal data into Snowflake. From _loaded_at.
  - name: govocal_email_metrics
    description: |
      Email campaign metrics aggregating delivery statistics and engagement metrics across all campaign deliveries.
    columns:
      - name: email_campaign_id
        description: Unique identifier for each email campaign.
      - name: sender
        description: |
          Origination source of the email. Example 'author'. Email campaigns originating outside the Go Vocal
          platform and not appearing in the campaigns source are labeled 'external'.
      - name: reply_to
        description: Email address for recipients to reply to.
      - name: subject
        description: Subject line of the email.
      - name: deliveries_count
        description: Number of delivery records for the email campaign.
      - name: created_at
        description: Timestamp when the email campaign was created.
      - name: updated_at
        description: Timestamp when the email campaign was last updated.
      - name: attempted
        description: Count of email deliveries (with any status).
      - name: delivered
        description: Count of email deliveries with status 'delivered','accepted','opened', or 'clicked'.
      - name: opened
        description: Count of email deliveries with status 'opened' or 'clicked'.
      - name: clicked
        description: Count of email deliveries with status 'clicked'.
      - name: click_rate
        description: Count of emails clicked, divided by count of emails delivered. Null if zero delivered emails.
      - name: open_rate
        description: Count of emails opened, divided by count of emails delivered. Null if zero delivered emails.
      - name: first_sent_at
        description: Timestamp of the earliest email sent for this campaign.
      - name: last_sent_at
        description: Timestamp of the latest email sent for this campaign.
      - name: data_loaded_at
        description: Timestamp of the most recent load of Go Vocal data into Snowflake. From _loaded_at.
  - name: govocal_ai_survey_respondents
    description: |
      This model provides Phase 1 AI survey responses with demographic info added from user profiles.
      It is limited to only the non-admin respondents who submitted ('published') the survey, removing drafts.
    columns:
      - name: survey_respondent_id
        description: User ID of the survey respondent.
      - name: age
        description: Response to the question 'What is your age?'
      - name: gender_array
        description: Responses to the question "What is your gender identity?"
      - name: gender_category
        description: |
          Response to the question 'What is your gender identity?' with multiple responses categorized as 'multiple'.
      - name: race_ethnicity_array
        description: Responses to the question "What is your race or ethnicity?"
      - name: race_ethnicity_category
        description: |
          Response to the question 'What is your race or ethnicity?' with multiple responses categorized as 'multiple'.
      - name: user_status
        description: |
          User status. The possible statuses are
          'invited' if invite_status is pending,
          'active' if a user is registered and not blocked,
          'incomplete' for all else.
      - name: publication_status
        description: Status of publication (e.g., published, draft).
      - name: current_work_status
        description: Response to the question "Are you currently working?"
      - name: role_at_work
        description: Response to the question "What is your role at work?"
      - name: county
        description: Response to the question "Which county do you live in?"
      - name: field_of_work
        description: Response to the question "Which best describes your field of work?"
      - name: economic_impact_expectation
        description: Response to the question "What do you expect the impact of AI to be on the economy?"
      - name: government_action_suggestion
        description: |
          Response to the question "What would you like the government to do about what you see as these impacts?"
      - name: personal_ai_impact
        description: |
          Response to the question "What has been your experience if any of the impact of AI on your own job
          and workplace?"
      - name: availability_for_discussion
        description: Response to a question about whether the respondent is open to joining a live discussion about AI.
      - name: fields_completed_count
        description: Count of how many survey questions the respondent answered.
      - name: _loaded_at
        description: Timestamp of the most recent load of Go Vocal data into Snowflake. From _loaded_at.
