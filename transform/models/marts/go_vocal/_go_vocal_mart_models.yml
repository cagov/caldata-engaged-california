version: 2
models:
  - name: govocal_user_counts
    description: |
      This model joins user data with AI Survey data to calculate the count of Go Vocal users by various demographic
      and survey response fields.
    columns:
      - name: role_at_work
        description: Response to the question "What is your role at work?"
      - name: county
        description: Response to the question "Which county do you live in?"
      - name: field_of_work
        description: Response to the question "Which best describes your field of work?"
      - name: age
        description: Response to the question "What is your age?"
      - name: gender
        description: |
          Response to the question "What is your gender identity?" with multiple responses categorized as "multiple".
      - name: race_ethnicity
        description: |
          Response to the question "What is your race or ethnicity?" with multiple responses categorized as "multiple".
      - name: gv_users_count
        description: Count of Go Vocal users in each demographic and survey response category.
      - name: respondents_count
        description: Count of survey respondents in each demographic and survey response category.
      - name: submitted_count
        description: Count of survey responses submitted by users in each demographic and survey response category.
      - name: drafts_count
        description: |
          Count of survey responses saved as drafts by users in each demographic and survey response category.
      - name: available_for_discussion_count
        description: |
          Count of survey respondents who answered "Yes" or "Maybe" to whether they would be open to joining a live
          discussion about AI.
      - name: all_fields_completed_count
        description: Count of survey respondents who completed all fields in the AI survey.
  - name: govocal_email_metrics
    description: |
      Email campaign metrics aggregating delivery statistics and engagement metrics across all campaign deliveries.
    columns:
      - name: email_campaign_id
        description: Unique identifier for each email campaign.
      - name: sender
        description: |
          Origination source of the email. Example 'author'. Email campaigns originating outside the Go Vocal
          platform and not appearing in the campaigns source are labeled 'external'.
      - name: reply_to
        description: Email address for recipients to reply to.
      - name: subject
        description: Subject line of the email.
      - name: deliveries_count
        description: Number of delivery records for the email campaign.
      - name: created_at
        description: Timestamp when the email campaign was created.
      - name: updated_at
        description: Timestamp when the email campaign was last updated.
      - name: sent
        description: Count of email deliveries with status "sent".
      - name: delivered
        description: Count of email deliveries with status "delivered".
      - name: opened
        description: Count of email deliveries with status "opened".
      - name: clicked
        description: Count of email deliveries with status "clicked".
      - name: first_sent_at
        description: Timestamp of the earliest email sent for this campaign.
      - name: last_sent_at
        description: Timestamp of the latest email sent for this campaign.
