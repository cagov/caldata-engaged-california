version: 2
models:
  - name: int_ethelo_e3_comments_and_responses
    description: |
      "all didactic responses in the E3 platform -- includes
      all comments and write-in survey responses"
    columns:
      - name: COMMENT_ID
        description: "if response was a comment, this is the unique identifier"
      - name: REPLY_TO_ID
        description: "if comment is a reply, this is the comment_id of the parent"
      - name: PARTICIPANT_ID
        description: "ethelo participant id"
      - name: CONTENT
        description: "comment or survey response content"
      - name: QUESTION
        description: "prompt in Ethelo"
      - name: POSTED_ON
        description: "date of comment or response"
      - name: LIKE_COUNT
        description: "Number of likes the comment received from other users in the platform."
      - name: _FILE_UPLOAD_DATE
        description: "date of last ethelo data upload"

  - name: int_participant_survey_responses
    description: |
      "pivoted survey responses for E3 participants with one row per participant.
      This intermediate table consolidates all survey question responses and can be
      reused across multiple marts and models."
    columns:
      - name: PARTICIPANT_ID
        description: "unique ethelo participant identifier"
        tests:
          - not_null
          - unique
      - name: POINT_OF_PRIDE
        description: "response to 'Opening question - What makes you proud about your role in public service?'"
      - name: IDEA_DEPT
        description: "response to 'Share your idea - Which department or agency does your idea apply to?'"
      - name: POS_TYPE
        description: "response to 'About you - Position type'"
      - name: CA_TENURE
        description: "response to 'About you - How long have you worked for the State of California?'"
      - name: LAST_SURVEY_RESPONSE_DATE
        description: "timestamp of participant's most recent survey response"
      - name: _FILE_UPLOAD_DATE
        description: "date of last ethelo data upload"

  - name: int_extracted_problems
    description: |
      "problems extracted from E3 comments and survey responses using Snowflake LLM.
      Each row represents one specific problem identified in a comment. Multiple problems
      can be extracted from a single comment, resulting in multiple rows per comment."
    config:
      materialized: incremental
      unique_key: ["comment_id"]
    columns:
      - name: COMMENT_ID
        description: "unique identifier of the source comment (null for survey responses)"
      - name: PARTICIPANT_ID
        description: "ethelo participant id who made the comment"
        tests:
          - not_null
      - name: POSTED_ON
        description: "date when the comment was posted"
        tests:
          - not_null
      - name: PROBLEM_SEQUENCE
        description: "sequence number for problems extracted from the same comment (1, 2, 3, etc.)"
        tests:
          - not_null
      - name: REPLY_TO_ID
        description: "if comment is a reply, this is the comment_id of the parent"
      - name: SOURCE_COMMENT
        description: "original comment or survey response content"
      - name: SOURCE_QUESTION
        description: "original prompt or question in Ethelo"
      - name: _FILE_UPLOAD_DATE
        description: "date of last ethelo data upload"
      - name: PROBLEM_TEXT
        description: "specific problem identified by the LLM"
        tests:
          - not_null
      - name: PROBLEM_LENGTH
        description: "character length of the extracted problem text"
      - name: DEPARTMENT_USER_DEFINED
        description: Array of department(s) from explicit user entries (dropdown and write-in) for the comment
      - name: DEPARTMENT_AI_GENERATED
        description: Array of departments inferred by the LLM when user response was unmapped or missing
      - name: DEPARTMENT_USER_AI_COMBINED
        description: |
          Array combining user-defined and AI-generated departmentss with priority logic -
          user-defined (if present and mapped) takes precedence over AI-generated
      - name: PROBLEMS_JSON
        description: "raw JSON response from the LLM containing all extracted problems"
      - name: EXTRACTION_STATUS
        description: "status of the LLM extraction (SUCCESS or FAILED)"
      - name: PROCESSED_AT
        description: "timestamp when the LLM processing occurred"

  - name: int_extracted_solutions
    description: |
      Solutions extracted from E3 comments and survey responses using Snowflake LLM.
      Each row represents one specific solution identified in a comment. Multiple solutions
      can be extracted from a single comment, resulting in multiple rows per comment.
      Shortened solutions are also generated through a second LLM call in order to create
      shorter, more generic labels for easier categorization and analysis.
    config:
      materialized: incremental
      unique_key: ["comment_id"]
    columns:
      - name: COMMENT_ID
        description: unique identifier of the source comment (null for survey responses)
      - name: PARTICIPANT_ID
        description: ethelo participant id who made the comment
        tests:
          - not_null
      - name: POSTED_ON
        description: date when the comment was posted
        tests:
          - not_null
      - name: SOLUTION_SEQUENCE
        description: sequence number for solutions extracted from the same comment (1, 2, 3, etc.)
        tests:
          - not_null
      - name: SOLUTION_ID
        description: unique identifier for the extracted solution
        tests:
          - not_null
          - unique
      - name: REPLY_TO_ID
        description: if comment is a reply, this is the comment_id of the parent
      - name: PARENT_COMMENT_ID
        description: comment_id of the parent comment for linking solutions to problem discussions
      - name: SOURCE_COMMENT
        description: original comment or survey response content
      - name: SOURCE_QUESTION
        description: original prompt or question in Ethelo
      - name: SOLUTION_TEXT
        description: specific solution identified by the LLM
        tests:
          - not_null
      - name: SOLUTION_LENGTH
        description: character length of the extracted solution text
      - name: SOLUTIONS_JSON
        description: raw JSON response from the LLM containing all extracted solutions
      - name: SOLUTION_SHORTENED_ALL
        description: concatenated string of all shortened solutions separated by " | "
      - name: SOLUTION_SHORTENED_ARRAY
        description: array of shortened solutions
      - name: SOLUTION_SHORTENED_JSON
        description: raw JSON response from the LLM containing shortened solutions
      - name: _FILE_UPLOAD_DATE
        description: date of last ethelo data upload
      - name: PROCESSED_AT
        description: timestamp when the LLM processing occurred

  - name: int_problem_solution_links
    description: |
      "links between extracted problems and solutions using multiple approaches:
      direct replies, same comment, thread replies, and AI-powered semantic matching.
      Each row represents one problem-solution relationship with confidence scoring."
    columns:
      - name: PROBLEM_COMMENT_ID
        description: "comment_id where the problem was identified"
      - name: PROBLEM_PARTICIPANT_ID
        description: "participant who posted the comment containing the problem"
      - name: PROBLEM_POSTED_ON
        description: "date when the problem comment was posted"
      - name: PROBLEM_SEQUENCE
        description: "sequence number of the problem within its comment"
      - name: PROBLEM_TEXT
        description: "text of the identified problem"
      - name: SOLUTION_COMMENT_ID
        description: "comment_id where the solution was identified"
      - name: SOLUTION_PARTICIPANT_ID
        description: "participant who posted the comment containing the solution"
      - name: SOLUTION_POSTED_ON
        description: "date when the solution comment was posted"
      - name: SOLUTION_SEQUENCE
        description: "sequence number of the solution within its comment"
      - name: SOLUTION_TEXT
        description: "text of the identified solution"
      - name: LINK_TYPE
        description: "type of relationship: DIRECT_REPLY, SAME_COMMENT, THREAD_REPLY, or SEMANTIC_MATCH"
      - name: CONFIDENCE_SCORE
        description: "confidence score for the problem-solution relationship (0.0-1.0)"
      - name: LINK_EXPLANATION
        description: "explanation of why this problem and solution are linked"
      - name: FINAL_LINK_SCORE
        description: "composite score considering both confidence and link type"
      - name: LINK_ID
        description: "unique identifier for this problem-solution link"
      - name: LINKED_AT
        description: "timestamp when the link was created"

  - name: int_e3_topic_modeling
    description: |
      "Topic modeling output produced by the UMAP + HDBSCAN pipeline for E3 content.
      Contains one record per content item with cluster assignments, probabilities,
      and 2D projections for visualization."
    columns:
      - name: CONTENT_TYPE
        description: "Source content type processed for topic modeling"
      - name: TOPIC_ID
        description: "Stable topic identifier per content type; NULL for outliers"
      - name: CONTENT_ID
        description: "Identifier of the source record from e3_embeddings_unified"
      - name: PARTICIPANT_ID
        description: "Participant identifier associated with the content"
      - name: ORIGINAL_TEXT
        description: "Original content text used for clustering and labeling"
      - name: TOPIC_PROBABILITY
        description: "Cluster membership probability when available"
      - name: IS_OUTLIER
        description: "Whether the record was treated as noise by HDBSCAN"
      - name: UMAP_X
        description: "First coordinate from the standardized 2D UMAP projection"
      - name: UMAP_Y
        description: "Second coordinate from the standardized 2D UMAP projection"

  - name: int_e3_topic_labeling
    description: |
      "LLM-generated topic labels, descriptions, and representative quotes for each
      cluster emitted by int_e3_topic_modeling."
    config:
      meta:
        llm_model: "{{ env_var('LLM_MODEL_HIGH') if target.name == 'prd' else env_var('LLM_MODEL_LOW') }}"
    columns:
      - name: CONTENT_TYPE
        description: "Source content type of the topic"
      - name: TOPIC_ID
        description: "Topic identifier aligned with int_e3_topic_modeling"
      - name: TOPIC_MEMBER_COUNT
        description: "Number of content records assigned to the topic"
      - name: TOPIC_NAME
        description: "Short LLM-generated title summarizing the topic"
      - name: TOPIC_DESCRIPTION
        description: "Narrative description produced by the LLM"
      - name: REPRESENTATIVE_QUOTES
        description: "JSON array (stored as text) of representative quotes"
      - name: COMMENTS_FOR_LABELING
        description: "Concatenated snippets supplied to the LLM for labeling"

  - name: int_comment_department
    description: |
      This model populates the department field for each comment based on department survey response
      and comment contents. It uses an LLM to fill in gaps where the survey response is missing
      or does not match a known department. Department is provided in 3 output fields for traceability:
      user-defined (from survey), AI-generated (from LLM), and combined (user-defined takes priority, AI fallback).
    columns:
      - name: posted_by_id
        description: Identifier for the participant who posted the comment
      - name: comment_id
        description: Unique identifier for the comment
      - name: department_user_defined
        description: Array of department(s) from explicit user entries (dropdown and write-in) for the comment
      - name: department_ai_generated
        description: Array of departments inferred by the LLM when user response was unmapped or missing
      - name: department_user_ai_combined
        description: |
          Array combining user-defined and AI-generated departmentss with priority logic -
          user-defined (if present and mapped) takes precedence over AI-generated

  - name: int_ux_hand_labelled_themes
    description: |
      The purpose of this model is to map the hand labelled themes and types that the UX team provided per comment
      back to their comment ID, for further processing.
    columns:
      - name: participant_id
        description: Identifier for the participant who posted the comment
      - name: comment_id
        description: Unique comment identifier
      - name: reply_to_id
        description: Unique participant identifier if the comment was a response to another
      - name: content
        description: Full content of the comment
      - name: question
        description: Which Ethelo question the comment was in response to
      - name: posted_on
        description: Date posted
      - name: like_count
        description: Number of likes the comment received from other users in the platform.
      - name: _file_upload_date
        description: Last upload date
      - name: main_idea_type
        description: UX-team label for TYPE of comment
      - name: main_idea_primary_theme
        description: UX-team label for THEME of comment
      - name: main_idea_subthemes
        description: UX-team label for SUBTHEMES of comment
