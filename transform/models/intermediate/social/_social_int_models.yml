version: 2

models:
  - name: int_facebook_pages__post_analytics
    description: Intermediate model that aggregates key engagement and video metrics for each Facebook post.
    columns:
      - name: post_id
        description: Unique identifier for each Facebook post.
      - name: page_id
        description: Identifier for the Facebook page to which the post belongs.
      - name: post_message
        description: The text content of the Facebook post.
      - name: post_type
        description: The type of the Facebook post (e.g. status, link, photo, video).
      - name: permalink_url
        description: The URL of the Facebook post.
      - name: picture_url
        description: The URL of the image associated with the Facebook post.
      - name: created_at
        description: The timestamp when the Facebook post was created.
      - name: updated_at
        description: The timestamp when the Facebook post was last updated.
      - name: is_expired
        description: Indicates whether the Facebook post is expired (i.e. no longer active or visible on the page).
      - name: post_views_total
        description: Total number of views for the post (including both organic and paid views).
      - name: clicks_total
        description: Total clicks on any part of the post (link, photo, name, etc.).
      - name: share_count
        description: The number of times the Facebook post has been shared.
      - name: reactions_total
        description: Total reactions across all reaction types (Like, Love, Haha, Wow, Sorry, Anger).
      - name: reactions_like
        description: Count of Like reactions.
      - name: reactions_love
        description: Count of Love reactions.
      - name: reactions_haha
        description: Count of Haha reactions.
      - name: reactions_wow
        description: Count of Wow reactions.
      - name: reactions_sorry
        description: Count of Sorry (Sad) reactions.
      - name: reactions_anger
        description: Count of Anger reactions.
      - name: post_video_views
        description: Total video views (organic + paid). Null for non-video posts.
      - name: post_video_view_time
        description: Total milliseconds the video was watched across all views.
      - name: post_video_avg_time_watched
        description: Average milliseconds watched per view.
      - name: total_engagements
        description: Total engagements, calculated as the sum of all reactions and clicks.
      - name: engagement_rate_pct
        description: Engagement rate, calculated as (total reactions + clicks) / total views × 100.
      - name: POST_VIDEO_LENGTH
        description: The length of the video in seconds.
      - name: POST_VIDEO_COMPLETE_VIEWS_ORGANIC
        description: Total organic complete views of the video.
      - name: POST_VIDEO_COMPLETE_VIEWS_PAID
        description: Total paid complete views of the video.
      - name: CLICK_THROUGH_RATE_PCT
        description: Click-through rate, calculated as (clicks) / (views) × 100.
      - name: REACTION_RATE_PCT
        description: Reaction rate, calculated as (reactions) / (views) × 100.
  - name: int_instagram_posts_join
    description: |
      this model combines the media_history table which has all instagram posts and
      their metadata with the media_insights table which has metrics per post.
    columns:
      - name: PERMALINK
        description: URL to instagram post.
      - name: MEDIA_TYPE
      - name: MEDIA_PRODUCT_TYPE
      - name: MEDIA_URL
        description: URL to the media contained within an instagram post.
      - name: CAPTION
      - name: CAROUSEL_ALBUM_ID
      - name: IS_COMMENT_ENABLED
      - name: IS_STORY
      - name: CREATED_TIME
      - name: MEDIA_ID
      - name: LIKE_COUNT
      - name: COMMENT_COUNT
      - name: VIDEO_PHOTO_IMPRESSIONS
      - name: VIDEO_PHOTO_REACH
      - name: VIDEO_PHOTO_SAVED
      - name: CAROUSEL_ALBUM_ENGAGEMENT
      - name: CAROUSEL_ALBUM_IMPRESSIONS
      - name: CAROUSEL_ALBUM_REACH
      - name: CAROUSEL_ALBUM_SAVED
      - name: STORY_IMPRESSIONS
      - name: STORY_REACH
      - name: NAVIGATION
      - name: REEL_REACH
      - name: REEL_SAVED
      - name: VIDEO_PHOTO_ENGAGEMENT
      - name: STORY_EXITS
      - name: STORY_REPLIES
      - name: STORY_TAPS_BACK
      - name: STORY_TAPS_FORWARD
      - name: STORY_SWIPE_FORWARD
      - name: REEL_COMMENTS
      - name: REEL_LIKES
      - name: REEL_SHARES
      - name: REEL_TOTAL_INTERACTIONS
      - name: _FIVETRAN_ID
      - name: _FIVETRAN_SYNCED
