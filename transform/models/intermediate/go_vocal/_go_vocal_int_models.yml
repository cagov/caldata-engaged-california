version: 2
models:
  - name: int_govocal_ai_survey
    description: |
      This model extracts and transforms survey responses from the 'Impact of AI on work' survey.
    columns:
      - name: survey_id
        description: Unique identifier for each 'Impact of AI on work' survey.
      - name: survey_respondent_id
        description: User ID of the survey respondent.
      - name: published_at
        description: Timestamp when the survey was published.
      - name: submitted_at
        description: Timestamp when the survey was submitted.
      - name: publication_status
        description: Status of publication (e.g., published, draft).
      - name: created_at
        description: Timestamp when the survey was created.
      - name: updated_at
        description: Timestamp when the survey was last updated.
      - name: href
        description: Link to the survey response.
      - name: custom_field_values
        description: JSON object containing custom field values from the survey.
      - name: current_work_status
        description: Response to the question "Are you currently working?"
      - name: role_at_work
        description: Response to the question "What is your role at work?"
      - name: county
        description: Response to the question "Which county do you live in?"
      - name: field_of_work
        description: Response to the question "Which best describes your field of work?"
      - name: economic_impact_expectation
        description: Response to the question "What do you expect the impact of AI to be on the economy?"
      - name: government_action_suggestion
        description: |
          Response to the question "What would you like the government to do about what you see as these impacts?"
      - name: personal_ai_impact
        description: |
          Response to the question "What has been your experience if any of the impact of AI on your own job
          and workplace?"
      - name: availability_for_discussion
        description: Response to a question about whether the respondent is open to joining a live discussion about AI.
      - name: survey_fields_completed_count
        description: Count of how many survey questions the respondent answered.
      - name: region
        description: Region corresponding to the California county, as described by sortition strategy.
  - name: int_govocal_users_x_ai_survey
    description: |
      This model joins all non-admin users with their responses from the ai survey. Users who did not
      submit a survey are included.
    columns:
      - name: user_id
        description: Unique identifier for the Go Vocal user.
      - name: survey_respondent_id
        description: User ID of the survey respondent.
      - name: survey_id
        description: Unique identifier for each 'Impact of AI on work' survey.
      - name: age
        description: Response to the question 'What is your age?'
      - name: gender_array
        description: Responses to the question "What is your gender identity?"
      - name: gender_category
        description: |
          Response to the question 'What is your gender identity?' with multiple responses categorized as 'multiple'.
      - name: race_ethnicity_array
        description: Responses to the question "What is your race or ethnicity?"
      - name: race_ethnicity_category
        description: |
          Response to the question 'What is your race or ethnicity?' with multiple responses categorized as 'multiple'.
      - name: user_status
        description: |
          User status. The possible statuses are
          'invited' if invite_status is pending,
          'active' if a user is registered and not blocked,
          'incomplete' for all else.
      - name: publication_status
        description: Status of publication (e.g., published, draft).
      - name: current_work_status
        description: Response to the question "Are you currently working?"
      - name: role_at_work
        description: Response to the question "What is your role at work?"
      - name: county
        description: Response to the question "Which county do you live in?"
      - name: region
        description: Region corresponding to the California county, as described by sortition strategy.
      - name: field_of_work
        description: Response to the question "Which best describes your field of work?"
      - name: economic_impact_expectation
        description: Response to the question "What do you expect the impact of AI to be on the economy?"
      - name: government_action_suggestion
        description: |
          Response to the question "What would you like the government to do about what you see as these impacts?"
      - name: personal_ai_impact
        description: |
          Response to the question "What has been your experience if any of the impact of AI on your own job
          and workplace?"
      - name: availability_for_discussion
        description: Response to a question about whether the respondent is open to joining a live discussion about AI.
      - name: fields_completed_count
        description: Count of how many survey questions and demographic questions the respondent answered.
      - name: _loaded_at
        description: Timestamp of the most recent load of Go Vocal data into Snowflake. From _loaded_at.
