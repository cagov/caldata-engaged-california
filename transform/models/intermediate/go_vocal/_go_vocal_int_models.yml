version: 2
models:
  - name: int_govocal_ai_survey
    description: |
      This model extracts and transforms survey responses from the 'Impact of AI on work' survey.
    columns:
      - name: idea_id
        description: Unique identifier for each idea.
      - name: author_id
        description: User ID of the survey respondent.
      - name: published_at
        description: Timestamp when the survey was published.
      - name: submitted_at
        description: Timestamp when the survey was submitted.
      - name: publication_status
        description: Status of publication (e.g., published, draft).
      - name: created_at
        description: Timestamp when the survey was created.
      - name: updated_at
        description: Timestamp when the survey was last updated.
      - name: href
        description: Link to the survey response.
      - name: custom_field_values
        description: JSON object containing custom field values from the survey.
      - name: current_work_status
        description: Response to the question "Are you currently working?"
      - name: role_at_work
        description: Response to the question "What is your role at work?"
      - name: county
        description: Response to the question "Which county do you live in?"
      - name: field_of_work
        description: Response to the question "Which best describes your field of work?"
      - name: economic_impact_expectation
        description: Response to the question "What do you expect the impact of AI to be on the economy?"
      - name: government_action_suggestion
        description: |
          Response to the question "What would you like the government to do about what you see as these impacts?"
      - name: personal_ai_impact
        description: |
          Response to the question "What has been your experience if any of the impact of AI on your own job
          and workplace?"
      - name: availability_for_discussion
        description: Response to a question about whether the respondent is open to joining a live discussion about AI.
      - name: fields_completed_count
        description: Count of how many survey questions the respondent answered.
