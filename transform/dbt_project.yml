# Project settings
name: caldata_engaged_california
version: "1.0.0"
config-version: 2

flags:
  send_anonymous_usage_stats: false
  use_colors: true
  warn_error: false

# This setting configures which "profile" dbt uses for this project.
profile: caldata_engaged_california

# Variables for environment-specific configuration
vars:
  # LLM model configuration - automatically switch based on target
  llm_model: "{{ 'claude-4-sonnet' if target.name == 'prd' else 'llama4-maverick' }}"

# These configurations specify where dbt should look for different types of files.
# The `source-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: target # directory which will store compiled SQL files
clean-targets: # directories to be removed by `dbt clean`
  - target
  - dbt_packages

seeds:
  caldata_engaged_california:
    # resource-paths
    ethelo_la_agenda_setting:
      +enabled: false

models:
  caldata_engaged_california:
    staging:
      +materialized: view
      mailchimp:
        +schema: mailchimp
      ethelo:
        +schema: ethelo
        +enabled: false
      ethelo_la_deliberation:
        +schema: ethelo_la_deliberation
        +enabled: false
      bitly:
        +schema: bitly
      ethelo_e3:
        +schema: ethelo_e3

    intermediate:
      +materialized: view
      mailchimp:
        +schema: mailchimp
      ethelo:
        +schema: ethelo
        +enabled: false
      ethelo_la_deliberation:
        +schema: ethelo_la_deliberation
        +enabled: false
      ethelo_e3:
        +schema: ethelo_e3
      bitly:
        +schema: bitly

    marts:
      +materialized: table
      +database: "{{ env_var('DBT_ANALYTICS_DB', 'ANALYTICS_ENGCA_DEV') }}"
      mailchimp:
        +schema: mailchimp
      ethelo:
        +schema: ethelo
        +enabled: false
      ethelo_la_deliberation:
        +schema: ethelo_la_deliberation
        +enabled: false
      ethelo_e3:
        +schema: ethelo_e3
      bitly:
        +schema: bitly
      daily_report:
        +schema: daily_report
        ethelo_la_agenda_setting:
          +enabled: false
        ethelo_la_deliberation:
          +enabled: false
